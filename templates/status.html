<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Processing Status - Deepfake Detection System</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 2rem; }
    .container { max-width: 800px; margin: auto; }
    h1 { text-align: center; }
    pre {
      background: #f4f4f4;
      border: 1px solid #ddd;
      padding: 1rem;
      height: 400px;
      overflow-y: scroll;
      white-space: pre-wrap;
      word-wrap: break-word;
      font-size: 0.9rem;
    }
    a { text-decoration: none; color: #337ab7; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Processing Status</h1>
    <pre id="log-output">{{ logs|join('\n') }}</pre>
    <div id="result" style="margin-top: 1rem; font-weight: bold; font-size: 1.2rem; color: #2a9d8f;"></div>
    <p><a href="{{ url_for('index') }}">&#8592; Back to Upload</a></p>
  </div>

  <script>
    async function fetchLogs() {
      try {
        const response = await fetch('/logs');
        if (!response.ok) {
          console.error('Failed to fetch logs:', response.statusText);
          return;
        }
        const logs = await response.json();
        const logOutput = document.getElementById('log-output');
        logOutput.textContent = logs.join('\\n');

        // Look for result line and display it separately
        const resultDiv = document.getElementById('result');
        const resultLine = logs.find(line => line.toLowerCase().includes('result:'));
        if (resultLine) {
          // Extract result text after "Result:"
          const parts = resultLine.split('Result:');
          if (parts.length > 1) {
            resultDiv.textContent = 'Detection Result: ' + parts[1].trim();
          }
        }

        // Auto scroll to bottom
        logOutput.scrollTop = logOutput.scrollHeight;
      } catch (error) {
        console.error('Error fetching logs:', error);
      }
    }

    // Poll every 3 seconds
    setInterval(fetchLogs, 3000);
    // Initial fetch on page load
    fetchLogs();
  </script>
</body>
</html>
